<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>B HAN Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pink:#ff6b9d;--purple:#c44dff;--dark:#0a0a0a;--bg:#f5f5f7;--muted:#888;--grad:linear-gradient(135deg,#ff6b9d,#c44dff)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#0a0a0a;-webkit-font-smoothing:antialiased;min-height:100vh}
button{cursor:pointer;border:none;font-family:inherit;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink)}
::-webkit-scrollbar{display:none}

/* Login */
.login-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f0f0f,#1e0a2e,#3a0f4a)}
.login-card{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.login-logo{width:64px;height:64px;background:var(--grad);border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:30px;color:#fff;margin:0 auto 18px;box-shadow:0 8px 20px rgba(255,107,157,.4)}
.login-title{font-family:'DM Serif Display',serif;font-size:24px;text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.login-input{width:100%;padding:14px;border:1.5px solid #eee;border-radius:12px;font-size:14px;margin-bottom:12px}
.login-btn{width:100%;background:var(--grad);color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(255,107,157,.3)}
.login-err{background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px;text-align:center;font-weight:600}

/* App */
.app{max-width:1100px;margin:0 auto}

/* Header */
.header{background:#0a0a0a;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.alogo{display:flex;align-items:center;gap:10px}
.alogo-mark{width:36px;height:36px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:#fff}
.alogo-text{font-family:'DM Serif Display',serif;font-size:18px;letter-spacing:1px}
.alogo-sub{font-size:9px;color:#888;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:-2px}
.live-badge{font-size:10px;color:#22c55e;font-weight:700;display:flex;align-items:center;gap:4px}
.logout-btn{background:rgba(255,255,255,.1);color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;margin-left:10px}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;overflow-x:auto;position:sticky;top:60px;z-index:40}
.tab{padding:14px 18px;font-size:13px;font-weight:700;color:#888;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab.on{color:#ff3366;border-bottom-color:var(--pink)}

.body{padding:18px;padding-bottom:40px}

/* Section title */
.sect-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sect-title{font-size:22px;font-weight:800}
.sect-sub{font-size:11px;color:#888;margin-top:2px}
.add-btn{background:var(--grad);color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(255,107,157,.3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;margin-bottom:18px}
.stat{background:#fff;border-radius:14px;padding:16px;border-left:4px solid var(--pink);box-shadow:0 2px 10px rgba(0,0,0,.04)}
.stat-icon{font-size:20px}
.stat-lbl{font-size:10px;color:#888;font-weight:700;letter-spacing:.5px;margin-top:6px}
.stat-val{font-size:22px;font-weight:900;margin-top:2px}
.stat-sub{font-size:10px;color:#888;margin-top:2px}

/* Cards */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-title{font-size:13px;font-weight:800;margin-bottom:11px;letter-spacing:.3px}

/* Order card */
.order{background:#fff;border-radius:12px;padding:13px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;transition:.2s}
.order:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.order-hd{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.order-cust{font-size:14px;font-weight:700}
.order-id{font-size:11px;color:#888;font-family:monospace;margin-top:2px}
.order-ft{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666}
.order-total{font-size:15px;font-weight:900}
.status-tag{font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.s-pending{background:#fff7ed;color:#ea580c}
.s-confirmed{background:#eff6ff;color:#2563eb}
.s-processing{background:#f5f3ff;color:#7c3aed}
.s-shipped{background:#ecfeff;color:#0891b2}
.s-delivered{background:#f0fdf4;color:#16a34a}
.s-cancelled{background:#fef2f2;color:#dc2626}

/* Product card */
.prod-card{background:#fff;border-radius:12px;padding:11px;display:flex;gap:11px;align-items:center;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.prod-img{width:54px;height:54px;border-radius:10px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;position:relative}
.prod-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-meta{font-size:10.5px;color:#888;margin-top:2px}
.prod-price{font-size:14px;font-weight:900;color:#ff3366;margin-top:2px}
.prod-actions{display:flex;gap:6px}
.prod-edit{background:#f5f5f7;padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700}
.prod-del{background:#fef2f2;color:#dc2626;padding:7px 10px;border-radius:8px;font-size:11px;font-weight:700}

/* Form */
.form-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.form-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.label{font-size:10.5px;font-weight:700;color:#666;letter-spacing:.5px;margin-bottom:5px;display:block;text-transform:uppercase}
.input{width:100%;padding:11px 12px;border:1.5px solid #eee;border-radius:9px;font-size:13px;margin-bottom:12px;transition:.2s}
.input:last-child{margin-bottom:0}
.textarea{min-height:90px;resize:vertical;font-family:inherit;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.save-btn{width:100%;background:var(--grad);color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(255,107,157,.3);margin-top:8px}
.save-btn.ok{background:linear-gradient(135deg,#22c55e,#16a34a)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:#f5f5f7;width:30px;height:30px;border-radius:50%;font-size:18px}
.modal-body{padding:18px 20px}

/* Detail */
.det-customer{background:#fafafa;padding:13px;border-radius:11px;margin-bottom:14px}
.det-c-row{font-size:13px;color:#444;margin-bottom:5px}
.det-c-row strong{color:#000}
.contact-btns{display:flex;gap:8px;margin-top:10px}
.contact-btns a{flex:1;padding:9px;border-radius:9px;text-align:center;font-size:12px;font-weight:700;text-decoration:none}
.btn-call{background:#fff;border:1.5px solid #eee;color:#000}
.btn-wa{background:#22c55e;color:#fff}
.btn-bkash{background:var(--pink);color:#fff}

.status-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.status-btn{padding:10px;border-radius:9px;font-size:11px;font-weight:800;text-transform:uppercase;background:#f5f5f7;color:#333;letter-spacing:.5px}
.status-btn.on{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(255,107,157,.3)}

/* Items list */
.itm{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5;align-items:center}
.itm-img{width:42px;height:42px;border-radius:8px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;position:relative}
.itm-img img{width:100%;height:100%;object-fit:contain;padding:3px}
.itm-info{flex:1}
.itm-name{font-size:12px;font-weight:700}
.itm-meta{font-size:10.5px;color:#888;margin-top:1px}
.itm-price{font-size:13px;font-weight:900}

/* Coupon card */
.cpn{background:#fff;border-radius:12px;padding:13px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.cpn-left{display:flex;align-items:center;gap:11px}
.cpn-icon{width:42px;height:42px;background:linear-gradient(135deg,#fff0f5,#ffe5f0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.cpn-code{font-size:14px;font-weight:900;font-family:monospace;letter-spacing:1px}
.cpn-detail{font-size:11px;color:#888}
.cpn-active{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:4px;background:#f0fdf4;color:#16a34a}
.cpn-inactive{background:#fef2f2;color:#dc2626}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-msg{font-size:14px;font-weight:700;color:#888}

/* Toast */
@keyframes pop{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 10px 28px rgba(0,0,0,.3);animation:pop .3s}
.toast.err{background:#ef4444}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s}
.color-opt.on{border-color:#000}

/* File upload */
.upload-area{border:2px dashed #ddd;border-radius:11px;padding:18px;text-align:center;cursor:pointer;background:#fafafa;transition:.2s}
.upload-area:hover{border-color:var(--pink);background:#fff0f5}
.upload-text{font-size:12px;color:#888;margin-top:6px}

.imgs-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.img-item{width:60px;height:60px;border-radius:8px;background:#f5f5f7;position:relative;overflow:hidden}
.img-item img{width:100%;height:100%;object-fit:contain}
.img-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center}

@media (min-width:768px) {
  .body{padding:24px}
  .stats{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<div id="app"><div style="padding:60px;text-align:center;color:#888">Loading...</div></div>

<script src="firebase-config.js"></script>
<script src="data.js"></script>
<script src="admin.js"></script>
</body>
</html>
