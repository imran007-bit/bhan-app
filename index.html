<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#ff6b9d"/>
<meta name="description" content="B HAN — Korean Beauty BD. Korea's most viral K-beauty delivered to Bangladesh."/>
<title>B HAN — Korean Beauty BD</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pink:#ff6b9d;--purple:#c44dff;--dark:#0a0a0a;--bg:#faf8f6;--muted:#888;--grad:linear-gradient(135deg,#ff6b9d,#c44dff)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#0a0a0a;padding-bottom:80px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;font-family:inherit;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink)!important}
::-webkit-scrollbar{display:none}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes spin{to{transform:rotate(360deg)}}

.app{max-width:480px;margin:0 auto}

/* Header */
.header{background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-mark{width:38px;height:38px;background:var(--grad);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#fff;box-shadow:0 4px 14px rgba(255,107,157,.35)}
.logo-text{font-family:'DM Serif Display',serif;font-size:21px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:-2px}
.hactions{display:flex;gap:8px;align-items:center}
.hbtn{background:#f4f4f6;height:38px;padding:0 14px;border-radius:12px;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700}
.cart-count{background:var(--grad);color:#fff;border-radius:8px;padding:1px 7px;font-size:11px;font-weight:800}
.user-btn{background:#f4f4f6;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.user-btn.logged{background:var(--grad);color:#fff}

/* Announce */
.announce{background:var(--grad);color:#fff;text-align:center;padding:7px;font-size:12px;font-weight:600}

.content{padding:15px}

/* Hero */
.hero{background:linear-gradient(135deg,#0f0f0f,#1e0a2e,#3a0f4a);border-radius:22px;padding:28px 22px;color:#fff;position:relative;overflow:hidden;margin-bottom:20px}
.hero-orb1{position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,107,157,.4),transparent 65%);border-radius:50%;animation:float 4s ease-in-out infinite}
.hero-orb2{position:absolute;bottom:-60px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(196,77,255,.3),transparent 65%);border-radius:50%;animation:float 5s ease-in-out infinite reverse}
.hero-inner{position:relative}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:5px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:12px}
.hero h1{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.1;margin-bottom:8px;white-space:pre-line}
.hero p{font-size:13px;opacity:.75;margin-bottom:18px;line-height:1.5;white-space:pre-line}
.hero-cta{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#111;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700}

/* Promo Banner */
.promo-banner{border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.promo-title{font-size:15px;font-weight:800;color:#fff}
.promo-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px}
.promo-btn{background:#fff;padding:6px 14px;border-radius:100px;font-size:11px;font-weight:800;white-space:nowrap}

/* Categories */
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px}
.cat{background:#fff;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:6px;transition:all .2s}
.cat.on{background:var(--dark);color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.2)}

/* Search */
.search-wrap{position:relative;margin-bottom:18px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.search{width:100%;padding:13px 16px 13px 42px;border-radius:12px;border:1.5px solid #eee;font-size:14px;background:#fff;font-weight:500;transition:.2s}
.search:focus{border-color:var(--pink)}

/* Section */
.sec{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec h2{font-size:18px;font-weight:800;letter-spacing:-.3px}
.sec-count{font-size:12px;color:var(--muted);font-weight:600}

/* Featured */
.feat-row{display:flex;gap:11px;overflow-x:auto;padding-bottom:4px;margin:0 -15px 18px;padding-left:15px;padding-right:15px}
.feat{flex-shrink:0;width:155px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer}
.feat-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden}
.feat-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:8px}
.feat-info{padding:10px}
.feat-brand{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.feat-name{font-size:12px;font-weight:700;line-height:1.3;min-height:30px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-top:2px}
.feat-price{font-size:13px;font-weight:900;color:var(--pink);margin-top:5px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;transition:.2s}
.card:active{transform:scale(.97)}
.card-img{height:170px;position:relative;display:flex;align-items:center;justify-content:center;font-size:68px;overflow:hidden}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:10px}
.card-like{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.95);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:2}
.card-tag{position:absolute;top:9px;left:9px;font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;z-index:2}
.card-out{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:3}
.card-out-txt{background:#fff;color:#000;font-size:11px;font-weight:800;padding:4px 10px;border-radius:100px}
.card-disc{position:absolute;bottom:9px;left:9px;background:var(--dark);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;z-index:2}
.card-body{padding:12px}
.card-brand{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.card-name{font-size:12.5px;font-weight:700;line-height:1.3;height:34px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:6px}
.card-rating{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.card-rating span{color:#0a0a0a}
.card-foot{display:flex;justify-content:space-between;align-items:flex-end}
.price{font-size:15px;font-weight:900}
.old-price{font-size:10px;color:#bbb;text-decoration:line-through}
.add-btn{background:var(--dark);color:#fff;width:30px;height:30px;border-radius:8px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
.add-btn.ok{background:linear-gradient(135deg,#22c55e,#16a34a)}
.add-btn:disabled{background:#ccc;cursor:not-allowed}

/* Related products */
.related-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin:0 -15px;padding-left:15px;padding-right:15px}
.related-card{flex-shrink:0;width:130px;background:#fff;border-radius:14px;overflow:hidden;cursor:pointer}
.related-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.related-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:6px}
.related-body{padding:8px}
.related-name{font-size:11px;font-weight:700;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.related-price{font-size:12px;font-weight:900;color:var(--pink);margin-top:4px}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-end;animation:fadeIn .2s}
.sheet{background:#fff;width:100%;max-width:480px;margin:0 auto;border-radius:24px 24px 0 0;max-height:94vh;overflow-y:auto;animation:slideUp .32s cubic-bezier(.32,.72,0,1)}
.handle{display:flex;justify-content:center;padding:10px 0 0}
.handle-bar{width:38px;height:4px;background:#e5e5e5;border-radius:2px}
.sheet-pad{padding:0 20px 28px}

/* AUTH Modal */
.auth-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.auth-card{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.auth-logo{width:56px;height:56px;background:var(--grad);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:26px;color:#fff;margin:0 auto 16px;box-shadow:0 8px 20px rgba(255,107,157,.35)}
.auth-title{font-family:'DM Serif Display',serif;font-size:22px;text-align:center;margin-bottom:4px}
.auth-sub{text-align:center;color:#888;font-size:13px;margin-bottom:20px}
.auth-input{width:100%;padding:13px;border:1.5px solid #eee;border-radius:12px;font-size:14px;margin-bottom:10px;transition:.2s}
.auth-input:focus{border-color:var(--pink)}
.auth-btn{width:100%;background:var(--grad);color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(255,107,157,.3)}
.auth-switch{text-align:center;margin-top:14px;font-size:13px;color:#888}
.auth-switch span{color:var(--pink);font-weight:700;cursor:pointer}
.auth-err{background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px;text-align:center;font-weight:600}
.auth-skip{display:block;text-align:center;margin-top:12px;color:#888;font-size:12px;cursor:pointer;text-decoration:underline}

/* Product Detail */
.det-img-wrap{margin:12px 16px 0;height:290px;border-radius:18px;overflow:hidden;position:relative;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:110px}
.det-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:16px}
.det-close,.det-heart{position:absolute;background:rgba(255,255,255,.95);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;top:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:5}
.det-close{right:12px;font-size:20px}
.det-heart{left:12px}
.det-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.92);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;z-index:5}
.det-prev{left:12px}
.det-next{right:12px}
.dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.25);transition:.2s}
.dot.on{background:#000;width:20px;border-radius:3px}
.thumbs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto}
.thumb{width:54px;height:54px;border-radius:10px;flex-shrink:0;border:2px solid transparent;background:#f5f5f7;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:contain;padding:3px}
.thumb.on{border-color:var(--pink)}

.det-brand{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:16px}
.det-name{font-family:'DM Serif Display',serif;font-size:23px;line-height:1.2;margin:4px 0 8px}
.det-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px}
.stock-badge{background:#e8f5e8;color:#16a34a;font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px}
.out-badge{background:#fef2f2;color:#dc2626;font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.det-price{font-size:28px;font-weight:900}
.det-old{font-size:16px;color:#ccc;text-decoration:line-through}
.save-pill{background:#fff0f5;color:var(--pink);font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px}

.breakdown{background:#fffbf0;border:1.5px dashed #f0c060;border-radius:12px;padding:12px;margin-bottom:14px}
.bd-head{font-size:10px;font-weight:800;color:#b45309;letter-spacing:.8px;margin-bottom:6px}
.bd-row{display:flex;justify-content:space-between;font-size:11px;color:#78572a;margin-bottom:3px}
.bd-total{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:#b45309;padding-top:5px;margin-top:4px;border-top:1px dashed #e0c060}

.slabel{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:1.2px;margin:14px 0 8px}
.variants{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.var-btn{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;border:1.5px solid #eee;background:#fff}
.var-btn.on{border-color:var(--pink);background:#fff0f5;color:var(--pink)}
.qty-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qty-ctrl{background:#f5f5f7;border-radius:11px;display:flex;align-items:center}
.qty-b{width:36px;height:36px;font-size:20px;font-weight:700;color:#555;display:flex;align-items:center;justify-content:center}
.qty-v{font-size:14px;font-weight:800;padding:0 14px}

.det-desc{font-size:13.5px;color:#444;line-height:1.7;margin-bottom:14px}
.benefits{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.ben{background:#fafafa;padding:9px 11px;border-radius:11px;font-size:12px;font-weight:600;display:flex;gap:7px}
.ben-icon{color:var(--pink);flex-shrink:0}
.ings{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ing{background:#fff0f5;padding:5px 11px;border-radius:100px;font-size:11px;font-weight:600}
.howto{background:#fafafa;padding:13px;border-radius:12px;font-size:13px;color:#444;line-height:1.65;white-space:pre-line;margin-bottom:14px}
.det-cta{position:sticky;bottom:0;background:#fff;padding:12px 0 4px;border-top:1px solid #f0f0f0;display:flex;gap:8px}
.det-cta button{flex:1;padding:14px;border-radius:13px;font-size:14px;font-weight:700;color:#fff}
.btn-blk{background:var(--dark)}
.btn-pk{background:var(--grad);box-shadow:0 8px 20px rgba(255,107,157,.28)}

/* Cart */
.cart-pad{padding:20px}
.cart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cart-title{font-size:22px;font-weight:800}
.cart-sub{font-size:12px;color:var(--muted)}
.ci{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.ci-img{width:70px;height:70px;border-radius:12px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;overflow:hidden;position:relative}
.ci-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:4px}
.ci-info{flex:1;min-width:0}
.ci-brand{font-size:10px;color:var(--muted);font-weight:700}
.ci-name{font-size:12.5px;font-weight:700;line-height:1.3}
.ci-var{font-size:10px;color:#888;margin-top:2px}
.ci-row{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.ci-qty{background:#f5f5f7;border-radius:9px;display:flex;align-items:center}
.ci-qbtn{width:28px;height:28px;font-size:14px;font-weight:700;color:#555;display:flex;align-items:center;justify-content:center}
.ci-qval{font-size:12px;font-weight:800;padding:0 8px}
.ci-price{font-size:14px;font-weight:900}
.ci-rm{color:#ccc;align-self:flex-start;padding:3px;font-size:16px}
.cart-sum{margin-top:14px;padding-top:14px;border-top:2px solid #f5f5f5}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:7px}
.sum-free{color:#16a34a;font-weight:700}
.sum-note{background:#fff0f5;padding:9px;border-radius:9px;font-size:11px;color:var(--pink);font-weight:600;margin-bottom:10px}
.sum-total{display:flex;justify-content:space-between;font-size:18px;font-weight:900;padding-top:10px;border-top:1px solid #f0f0f0}
.sum-total-val{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.go-checkout{width:100%;padding:16px;border-radius:14px;background:var(--grad);color:#fff;font-size:15px;font-weight:800;margin-top:14px;box-shadow:0 10px 28px rgba(255,107,157,.28)}

/* Checkout */
.ck-hd{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.ck-back{background:#f5f5f7;width:34px;height:34px;border-radius:9px;font-size:18px;display:flex;align-items:center;justify-content:center}
.ck-title{font-size:20px;font-weight:800}
.finput{width:100%;padding:13px;border:1.5px solid #eee;border-radius:11px;font-size:13px;margin-bottom:9px;transition:.2s}
.finput:focus{border-color:var(--pink)}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.zone-opt{padding:13px;border-radius:11px;border:1.5px solid #eee;background:#fff;cursor:pointer}
.zone-opt.on{border-color:var(--pink);background:#fff0f5}
.zone-opt-name{font-size:12px;font-weight:700}
.zone-opt-price{font-size:11px;color:var(--muted);margin-top:2px}
.coupon-row{display:flex;gap:7px;margin-bottom:9px}
.coupon-row .finput{margin-bottom:0;flex:1}
.coupon-apply{background:var(--dark);color:#fff;padding:0 16px;border-radius:11px;font-size:13px;font-weight:700}
.coupon-ok{background:#f0fff4;border:1.5px solid #22c55e;border-radius:11px;padding:11px;display:flex;justify-content:space-between;margin-bottom:9px}
.pay-opt{display:flex;align-items:center;gap:12px;padding:13px;border-radius:11px;border:1.5px solid #eee;background:#fff;margin-bottom:9px;cursor:pointer}
.pay-opt.on{border-color:var(--pink);background:#fff0f5}
.pay-icon{font-size:22px}
.pay-info{flex:1}
.pay-name{font-size:13px;font-weight:700}
.pay-detail{font-size:11px;color:var(--muted);margin-top:1px}
.pay-radio{width:19px;height:19px;border-radius:50%;border:2px solid #ddd;flex-shrink:0}
.pay-opt.on .pay-radio{border:6px solid var(--pink)}
.bkash-info{background:#ff9eb520;border:1.5px solid var(--pink);border-radius:11px;padding:13px;margin-bottom:9px}
.bkash-info-title{font-size:11px;font-weight:800;color:#c23a6a;margin-bottom:6px}
.bkash-info-num{font-size:22px;font-weight:900;color:#000;letter-spacing:1px;font-family:monospace}
.bkash-info-amt{margin-top:6px;font-size:12px;color:#444}
.bkash-copy{background:var(--pink);color:#fff;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:5px}
.nagad-info{background:#ff6a0020;border:1.5px solid #ff6a00;border-radius:11px;padding:13px;margin-bottom:9px}
.nagad-info-title{font-size:11px;font-weight:800;color:#cc5500;margin-bottom:6px}
.nagad-info-num{font-size:22px;font-weight:900;color:#000;letter-spacing:1px;font-family:monospace}
.ck-summary{background:#fafafa;border-radius:12px;padding:14px;margin:16px 0}
.ck-sum-title{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:10px}
.ck-sum-row{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:5px}
.ck-sum-disc{color:#16a34a;font-weight:600}
.ck-sum-total{display:flex;justify-content:space-between;font-size:17px;font-weight:900;padding-top:9px;border-top:1px solid #eee}
.place-order{width:100%;padding:16px;border-radius:14px;background:var(--grad);color:#fff;font-size:15px;font-weight:800;box-shadow:0 10px 28px rgba(255,107,157,.28)}

/* Confirm */
.confirm-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#faf8f6,#fff)}
.confirm-inner{text-align:center;max-width:380px;width:100%}
.confirm-icon{width:88px;height:88px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px;box-shadow:0 18px 36px rgba(255,107,157,.3);animation:pulse .8s ease-in-out;color:#fff}
.confirm-title{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:8px}
.confirm-msg{color:#666;font-size:14px;line-height:1.6;margin-bottom:20px}
.confirm-card{background:#fff;padding:18px;border-radius:14px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.05);text-align:left}
.confirm-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:3px}
.confirm-id{font-size:18px;font-weight:900;font-family:monospace;letter-spacing:1px}
.confirm-amt{font-size:24px;font-weight:900;color:var(--pink)}
.confirm-back{background:var(--grad);color:#fff;padding:14px 30px;border-radius:13px;font-size:14px;font-weight:700}

/* Track */
.track-wrap{background:#fff;border-radius:14px;padding:18px}
.track-input{width:100%;padding:13px;border:1.5px solid #eee;border-radius:11px;font-size:14px;margin-bottom:8px}
.track-hint{font-size:11px;color:var(--muted);margin-bottom:10px}
.track-btn{width:100%;background:var(--grad);color:#fff;padding:13px;border-radius:11px;font-size:14px;font-weight:800}
.track-card{background:#fff;border-radius:12px;padding:16px;margin-top:12px}
.trow{display:flex;align-items:center;gap:10px;padding:8px 0}
.tdot{width:30px;height:30px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.tdot.done{background:var(--grad)}
.tlabel{font-size:13px;font-weight:700;color:#ccc}
.tlabel.done{color:#0a0a0a}
.tcurrent{font-size:10px;color:#16a34a;font-weight:700}

/* Account */
.acc-header{background:var(--grad);padding:30px 20px;color:#fff;text-align:center;border-radius:0 0 24px 24px;margin:-15px -15px 20px}
.acc-avatar{width:70px;height:70px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.4)}
.acc-name{font-size:18px;font-weight:800;font-family:'DM Serif Display',serif}
.acc-email{font-size:12px;opacity:.8;margin-top:3px}
.acc-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px}
.acc-item{padding:14px 16px;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;cursor:pointer}
.acc-item:last-child{border-bottom:none}
.acc-item-left{display:flex;align-items:center;gap:12px}
.acc-icon{font-size:18px;width:34px;height:34px;background:#f5f5f7;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logout-btn{width:100%;background:#fef2f2;color:#dc2626;padding:14px;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px}

/* My Orders */
.my-order{background:#fff;border-radius:12px;padding:13px;margin-bottom:9px}
.my-order-hd{display:flex;justify-content:space-between;margin-bottom:6px}
.my-order-id{font-size:12px;font-weight:900;font-family:monospace}
.my-order-status{font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase}
.s-pending{background:#fff7ed;color:#ea580c}
.s-confirmed{background:#eff6ff;color:#2563eb}
.s-processing{background:#f5f3ff;color:#7c3aed}
.s-shipped{background:#ecfeff;color:#0891b2}
.s-delivered{background:#f0fdf4;color:#16a34a}
.s-cancelled{background:#fef2f2;color:#dc2626}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.06);z-index:40;max-width:480px;margin:0 auto}
.bnav-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr}
.nav-btn{padding:9px 0;text-align:center;font-size:10px;font-weight:700;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.on{color:#ff3366}
.nav-icon{font-size:19px}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 10px 28px rgba(0,0,0,.3);animation:pop .3s;white-space:nowrap}
.toast.err{background:#ef4444}
.toast.ok{background:linear-gradient(135deg,#22c55e,#16a34a)}

/* Loading */
.loading{display:flex;justify-content:center;align-items:center;padding:60px}
.spinner{width:30px;height:30px;border:3px solid #f0f0f0;border-top-color:var(--pink);border-radius:50%;animation:spin 1s linear infinite}

.empty{text-align:center;padding:50px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty-msg{font-size:15px;font-weight:700;color:#888}
.empty-sub{font-size:13px;color:#bbb;margin-top:4px}
</style>
</head>
<body>
<div id="app" class="app">
  <div class="loading"><div class="spinner"></div></div>
</div>
<script src="firebase-config.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
